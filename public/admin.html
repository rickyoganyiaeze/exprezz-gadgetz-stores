<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Exprezz Gadgetz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #f1f5f9; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-blue-900">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h1 class="text-2xl font-bold text-center mb-6">Admin Login</h1>
            <input type="password" id="adminPassword" placeholder="Enter Password" 
                   class="w-full px-4 py-3 border rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none" onkeydown="if(event.key==='Enter')attemptLogin()">
            <p id="loginError" class="text-red-500 text-sm mb-2 hidden text-center">Incorrect password</p>
            <button onclick="attemptLogin()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Login</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="adminDashboard" class="hidden flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 text-white p-6 hidden md:block shrink-0">
            <div class="flex items-center gap-2 mb-10">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <span class="font-bold text-lg">Exprezz</span>
            </div>
            <nav class="space-y-2">
                <button onclick="showView('add')" id="btn-add" class="w-full text-left p-3 rounded-xl bg-white/10 font-semibold flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                    Add Product
                </button>
                <button onclick="showView('manage')" id="btn-manage" class="w-full text-left p-3 rounded-xl hover:bg-white/10 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                    Manage Products
                </button>
                <div class="pt-4 border-t border-white/10 mt-4">
                    <a href="/" class="w-full text-left p-3 rounded-xl hover:bg-white/10 flex items-center gap-2 text-blue-300">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                        View Store
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-8 overflow-auto">
            
            <!-- Mobile Header -->
            <div class="md:hidden flex justify-between items-center mb-6">
                 <h1 class="text-xl font-bold">Admin Dashboard</h1>
                 <a href="/" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">View Store</a>
            </div>

            <!-- Global Success Alert (Hidden by default) -->
            <div id="successAlert" class="hidden mb-6 bg-green-100 border border-green-300 rounded-xl p-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span class="font-semibold text-green-800">Product added successfully!</span>
                </div>
                <a href="/" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700 transition">
                    View on Site
                </a>
            </div>

            <!-- Add Product View -->
            <div id="addView">
                <h2 class="text-2xl font-bold mb-6 hidden md:block">Add New Product</h2>
                <div class="bg-white p-6 rounded-2xl shadow-sm max-w-4xl">
                    <form id="productForm" class="grid md:grid-cols-2 gap-6">
                        <!-- Left Column -->
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                                <input type="text" id="name" placeholder="e.g. Sony WH-1000XM5" required class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Price (N)</label>
                                    <input type="number" id="price" placeholder="50000" required class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Old Price (Optional)</label>
                                    <input type="number" id="originalPrice" placeholder="60000" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                                <select id="category" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                    <option value="gaming">Gaming Consoles</option>
                                    <option value="headphones">Headphones</option>
                                    <option value="speakers">Speakers</option>
                                    <option value="tablets">Tablets</option>
                                    <option value="accessories">Accessories</option>
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Stock Count</label>
                                    <input type="number" id="stock" placeholder="10" required class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Rating (1-5)</label>
                                    <input type="number" id="rating" min="1" max="5" placeholder="5" required class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>
                            </div>
                            <div class="flex gap-4 pt-2">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" id="bestSeller" class="rounded text-blue-600 focus:ring-blue-500">
                                    <span class="text-sm">Best Seller</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" id="flashDeal" class="rounded text-blue-600 focus:ring-blue-500">
                                    <span class="text-sm">Flash Deal</span>
                                </label>
                            </div>
                        </div>
                        
                        <!-- Right Column -->
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                                <textarea id="description" rows="4" placeholder="Describe the product..." required class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                            </div>
                            
                            <!-- Image Upload Section -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Product Image</label>
                                <div class="border-2 border-dashed p-6 rounded-xl text-center hover:border-blue-500 transition cursor-pointer relative" onclick="document.getElementById('imageInput').click()">
                                    <input type="file" id="imageInput" accept="image/*" class="hidden">
                                    <div id="uploadPlaceholder">
                                        <svg class="w-10 h-10 mx-auto text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                        <p class="text-sm text-gray-500 mt-2">Click to upload</p>
                                        <p id="fileName" class="text-xs text-gray-400 mt-1">PNG, JPG up to 10MB</p>
                                    </div>
                                    <img id="preview" src="" class="hidden mx-auto mt-2 max-h-40 rounded-lg">
                                </div>
                                <input type="hidden" id="imageUrl">
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="md:col-span-2 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                            <span>Add Product</span>
                            <svg id="loadingSpinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Manage Products View -->
            <div id="manageView" class="hidden">
                <h2 class="text-2xl font-bold mb-6 hidden md:block">Manage Products</h2>
                <div class="bg-white p-6 rounded-2xl shadow-sm">
                    <div id="productList" class="space-y-4">Loading...</div>
                </div>
            </div>

        </main>
    </div>

    <script>
    // CHANGE: Removed localhost URL so it works on Render
    const API = '/api';
    let isLoggedIn = false;

    // --- Login ---
    async function attemptLogin() {
        const pass = document.getElementById('adminPassword').value;
        const errorEl = document.getElementById('loginError');
        
        try {
            const res = await fetch(`${API}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: pass })
            });

            const data = await res.json();

            if (data.success) {
                isLoggedIn = true;
                showDashboard();
            } else {
                errorEl.classList.remove('hidden');
                document.getElementById('adminPassword').classList.add('border-red-500');
            }
        } catch (err) {
            alert('Could not connect to server.');
        }
    }

    function showDashboard() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('adminDashboard').classList.remove('hidden');
        loadProducts();
    }

    // --- Navigation ---
    function showView(view) {
        document.getElementById('addView').classList.add('hidden');
        document.getElementById('manageView').classList.add('hidden');
        document.getElementById(`btn-add`).classList.remove('bg-white/10');
        document.getElementById(`btn-manage`).classList.remove('bg-white/10');
        
        document.getElementById(`${view}View`).classList.remove('hidden');
        document.getElementById(`btn-${view}`).classList.add('bg-white/10');
        
        if (view === 'manage') loadProducts();
    }

    // --- Image Upload ---
    document.getElementById('imageInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('fileName').textContent = file.name;
        
        // Upload to server
        const formData = new FormData();
        formData.append('image', file);

        try {
            const res = await fetch(`${API}/upload`, { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.url) {
                document.getElementById('imageUrl').value = data.url;
                document.getElementById('preview').src = data.url;
                document.getElementById('preview').classList.remove('hidden');
            } else {
                alert('Upload failed: ' + (data.error || 'Unknown error'));
            }
        } catch (err) {
            alert('Error uploading image');
            console.error(err);
        }
    });

    // --- Save Product ---
    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const product = {
            name: document.getElementById('name').value,
            price: Number(document.getElementById('price').value),
            originalPrice: document.getElementById('originalPrice').value ? Number(document.getElementById('originalPrice').value) : null,
            category: document.getElementById('category').value,
            stock: Number(document.getElementById('stock').value),
            rating: Number(document.getElementById('rating').value),
            bestSeller: document.getElementById('bestSeller').checked,
            flashDeal: document.getElementById('flashDeal').checked,
            description: document.getElementById('description').value,
            image: document.getElementById('imageUrl').value
        };

        const res = await fetch(`${API}/products`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(product)
        });

        if (res.ok) {
            alert('Product Added!');
            e.target.reset();
            document.getElementById('preview').classList.add('hidden');
            document.getElementById('fileName').textContent = 'No file chosen';
        } else {
            alert('Error adding product');
        }
    });

    // --- Load Products ---
    async function loadProducts() {
        const res = await fetch(`${API}/products`);
        const products = await res.json();
        const container = document.getElementById('productList');

        if (products.length === 0) {
            container.innerHTML = '<p class="text-gray-500">No products found.</p>';
            return;
        }

        container.innerHTML = products.map(p => `
            <div class="flex items-center justify-between p-3 border rounded-xl bg-gray-50">
                <div class="flex items-center gap-3">
                    <img src="${p.image}" class="w-16 h-16 rounded-lg object-cover bg-gray-200">
                    <div>
                        <h4 class="font-semibold">${p.name}</h4>
                        <p class="text-sm text-gray-500">N${p.price.toLocaleString()}</p>
                    </div>
                </div>
                <button onclick="deleteProd(${p.id})" class="text-red-500 hover:bg-red-100 p-2 rounded-lg">
                    Delete
                </button>
            </div>
        `).join('');
    }

    async function deleteProd(id) {
        if(confirm('Delete this product?')) {
            await fetch(`${API}/products/${id}`, { method: 'DELETE' });
            loadProducts();
        }
    }
</script>
</body>
</html>
